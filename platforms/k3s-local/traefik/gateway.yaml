apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main
  namespace: traefik
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      protocol: HTTP
      port: 8000
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 8443 # port interne entryPoint websecure (pas 443)
      tls:
        mode: Terminate
        certificateRefs:
          - name: demo-tls-secret
            kind: Secret
            group: ""
          - name: argocd-tls-secret
            kind: Secret
            group: ""
      allowedRoutes:
        namespaces:
          from: All
