# 1. ClusterIssuer auto-signé "bootstrap"
#    Sert uniquement à émettre la CA racine du lab.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}


# 2. Certificate de la CA racine
#    isCA: true → ce cert peut signer d'autres certs.
#    Émis par le bootstrap, stocké dans lab-ca-secret.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: lab-ca
  secretName: lab-ca-secret
  duration: 87600h # 10 ans (on ne veut pas la renouveler souvent)
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io


# 3. ClusterIssuer "lab-ca"
#    Adossé à lab-ca-secret, signe tous les certs applicatifs.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lab-ca
spec:
  ca:
    secretName: lab-ca-secret
