# CRDs gérées par le chart Helm
crds:
  enabled: true
  keep: true

replicaCount: 1

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

# Activer le support de Gateway API via feature gate
# Sans ça, cert-manager ignore les Gateway et n'agit que sur les Ingress
featureGates: ExperimentalGatewayAPISupport=true

webhook:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

cainjector:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

prometheus:
  enabled: true
  servicemonitor:
    enabled: false
