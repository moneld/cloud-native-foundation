apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: demo-tls
  namespace: traefik
spec:
  secretName: demo-tls-secret
  duration: 8760h # 1 an
  renewBefore: 720h # renouveler 30 jours avant expiration
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    - demo.local
  issuerRef:
    name: lab-ca
    kind: ClusterIssuer
    group: cert-manager.io
